services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  httpd:
    image: httpd:2.4
    container_name: rbcapp1-httpd
    ports:
      - "8080:80"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rbcapp1-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  postgresql:
    image: postgres:16
    container_name: rbcapp1-postgresql
    environment:
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: rbcapp1-app
    ports:
      - "5000:5000"
    environment:
      - ES_HOST=http://elasticsearch:9200
      - ES_INDEX=rbcapp1-services
    depends_on:
      elasticsearch:
        condition: service_healthy
